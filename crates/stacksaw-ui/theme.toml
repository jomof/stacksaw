# stacksaw terminal theme.
#
# Style resolves in layers, each overriding the previous:
#   [base]                default for all content
#   [window.<id>]         per-window base
#   [role.<id>]           per-element role; may `extends` another role
#   [role.<id>.<state>]   role variant for a state
#   [state.<id>]          deltas applied last; may carry a marker `glyph` or
#                         scope fields to a column region (title / content)
# `extends` pulls in the named role's fields first, so a concept is defined once.
#
# A role sets any of: extends, fg, bg, glyph, and the modifier flags
# bold / dim / italic / underline / reversed (each true|false; unset inherits).
# Glyphs live here, not in code; a composite glyph shows its {template} inline
# and the renderer fills the placeholders. Free UI copy and git status letters
# (A/M/D/R/C) stay in code.
#
# Color values:
#   default                          terminal default
#   white gray dark_gray black red green yellow blue magenta cyan
#   indexed:N                        xterm-256 index
#   rgb:R,G,B                        truecolor
#   { truecolor = .., ansi256 = .. } explicit capability fallback
#   { rainbow = "<source>" }         generated hue (see [identity])
#   palette.<token>[.bg]             named color; ".bg" selects its background facet
#
# Names: `.` marks a structural level the resolver keys on; `_` only joins words
# within one flat name. So state.row_selected_unfocused is a single name, not a nesting,
# and a role's column prefix (stack_/commit_/file_) is a mnemonic, not a group.

# ── Palette ────────────────────────────────────────────────────────────────
# Named colors that carry meaning. Change one here and every user follows. A
# token is a bare color (fg) or a table with facets (palette.<t> = fg, .bg = bg).
[palette]
warn   = "yellow"         # lint warning, modified file, dirty
info   = "cyan"           # twin commit, renamed/copied file
muted  = "gray"           # secondary labels, titles, unknown status
faint  = "dark_gray"      # borders, trailing directories, hint separators
selection = "indexed:238" # selected-row bar (focused column); indexed to survive without truecolor
unfocused_selection = "indexed:235"  # selected-row bar when the column is unfocused: a faint
                          # near-background tint marks the row without dimming the column
accent = "cyan"           # interactive chrome: hint keys, palette prompt, help headings
key    = "yellow"         # keybinding chord in the help overlay
emphasis = "white"        # bright emphasis: focused title, overlay frames

[palette.ok]              # clean check, added line/file
fg = { truecolor = "rgb:63,185,80", ansi256 = "indexed:40" }  # explicit green, not
                          # ANSI "green" (index 2), which many palettes (e.g. the
                          # Tomorrow-Night default) render as an olive/yellow-green
bg = { truecolor = "rgb:18,34,24", ansi256 = "indexed:236" }  # neutral dark in

[palette.error]           # lint error, deleted line/file
fg = "red"                # 256 (where no green/red fill is subtle) — the colored
bg = { truecolor = "rgb:46,22,24", ansi256 = "indexed:236" }  # edge marker carries add/del there

# ── Identity & rainbow ───────────────────────────────────────────────────────
# A `{ rainbow = "<source>" }` fg takes its hue from an identity source. The
# renderer offers a source where it applies (commit rows have `commit`, file rows
# `file_dir`, stack rows `stack`, recents rows `recent`); a role may use only a
# source in scope. `hash` yields a stable golden-angle hue from a key; `arc`
# interpolates along [rainbow.arc] by position, reading as a ramp. The renderer
# supplies the key; `key` here just names it. Relevance (fade) is orthogonal to
# hue — see [rainbow] — so the same identity reads bright or dim by context.
[identity.stack]
mode = "hash"
key = "stack_name"

[identity.file_dir]
mode = "hash"
key = "file_dir"

[identity.commit]
mode = "arc"

[identity.recent]         # a recents row: its branch name when that branch is
mode = "hash"             # checked out in more than one known repo (shared
key = "branch_or_path"    # branches share a hue), else its path within the root

# Hues resolve in OKLCH, then convert to truecolor RGB or quantize to xterm-256.
# Lightness is constant across hues, leaving brightness free to carry state;
# chroma is pushed to the gamut edge to keep hues distinct.
[rainbow]
lightness = 0.72          # OKLCH L, held constant
chroma = 0.18             # OKLCH C target, gamut-mapped down as needed
relevance = 1.0           # global default; elements with a signal (e.g. recents
                          # by MRU age) pass their own relevance in its place
contrast_floor = 0.18     # minimum |L - L_bg| kept after dimming

# How relevance r dims a hue toward the background (drives every faded element):
#   L' = lerp(L, L_bg, lightness_toward_bg·(1-r));  C' = C·(1 - chroma·(1-r))
# Lower `chroma` to keep faded rows colorful; raise it to let them wash out.
[rainbow.dim]
lightness_toward_bg = 0.75
chroma = 0.85

# Arc for `arc` sources: h(i) = h0 + span·i/(n-1).
[rainbow.arc]
h0_deg = 250.0            # blue …
span_deg = -190.0         # … through magenta to orange

# Perceptual background the palette fades toward.
[rainbow.background]
mode = "auto"             # auto | dark | light
dark = 0.14               # OKLab L per mode
light = 0.96

# ── Cascade roots ────────────────────────────────────────────────────────────
# `bg` is also painted behind the whole scene. "default" defers to the terminal's
# background; a literal color forces a fixed backdrop. Use an explicit RGB rather
# than "black" (ANSI 0), which terminals remap to a themed dark gray. rgb:0,0,0 is
# true black for maximum contrast.
[base]
fg = "default"
bg = { truecolor = "rgb:0,0,0", ansi256 = "indexed:16" }

# Per-window base. Empty today; the place for a whole-pane default.
[window.stacks]
[window.commits]
[window.files]
[window.diff]
[window.checks]

# ── Shared roles ─────────────────────────────────────────────────────────────
# Reused across columns and the legend, so a mark looks the same everywhere.
[role.secondary]          # muted text: default fg, dimmed
dim = true

# Plain per-row content that carries neither an identity hue nor a status color:
# the commit title and the file directory. Calm by default; brightened on the
# selected row so it stays crisp against the selection bar. Stacks has no such
# element (its name is rainbow, its counters secondary).
[role.row_text]
fg = "palette.muted"
[role.row_text.row_selected]
fg = "palette.emphasis"

[role.dirty]              # uncommitted marker, on a stack and in the legend
glyph = "✎"
fg = "palette.warn"

# Lint and twin chips, on a commit and in the legend. Error and warning take a
# trailing count (e.g. "✗3").
[role.chip]
clean   = { glyph = "✓", fg = "palette.ok" }
error   = { glyph = "✗", fg = "palette.error" }
warning = { glyph = "⚠", fg = "palette.warn" }
twin    = { glyph = "⧉", fg = "palette.info" }

[role.ahead]              # ahead of upstream; inherits the surrounding style
glyph = "↑"
[role.behind]             # behind upstream
glyph = "↓"

[role.churn_added]        # "+N"
fg = "palette.ok"
[role.churn_deleted]      # "-N"
fg = "palette.error"

# ── Chrome ───────────────────────────────────────────────────────────────────
[role.column_border]
fg = "palette.faint"

[role.column_title]       # base is the unfocused title; focus in [state.column_focused]
fg = "palette.muted"

# ── Stacks ───────────────────────────────────────────────────────────────────
[role.stack_name]
fg = { rainbow = "stack" }

[role.stack_counters]     # "  {ahead}{a} {behind}{b}"
extends = "secondary"

# Recents ledger (other repos under the current stack). The repo name and the
# trailing branch marker carry the `recent` identity hue; the directory within
# the repo reads as plain row text (like a commit title / file dir). All fade by
# relevance (MRU age) through the shared dim path, so an aging row dims uniformly.
[role.recent_path]        # "{label}" directory within the repo; the plain row-text class
extends = "row_text"

[role.recent_row]         # repo name + branch text: the `recent` identity hue
fg = { rainbow = "recent" }

[role.recent_branch]      # trailing "{glyph}branch" marker on a recents row; the
glyph = "⎇ "              # branch text takes recent_row's hue, so only the marker
                          # glyph lives here

# ── Commits ──────────────────────────────────────────────────────────────────
[role.commit_header]      # "upstream {ref} {ahead}{a} {behind}{b}"
extends = "secondary"

[role.segment_riser]      # "{lead} {branch} {trail}"
fg = { rainbow = "commit" }
dim = true
lead = "╭┴"
trail = "─"

[role.commit_hash]
fg = { rainbow = "commit" }

[role.commit_subject]     # the plain row-text class (see [role.row_text])
extends = "row_text"

[role.commit_worktree]    # "{glyph} Uncommitted changes"
extends = "dirty"
italic = true

# ── Files ────────────────────────────────────────────────────────────────────
[role.file_message_glyph] # commit-message row marker
glyph = "✉"
fg = "palette.muted"

[role.file_message_path]  # "commit message" label
fg = "palette.muted"
italic = true

[role.file_status]        # A/M/D/R/C letter, keyed by git status
added = "palette.ok"
modified = "palette.warn"
deleted = "palette.error"
renamed = "palette.info"
copied = "palette.info"
other = "palette.muted"

[role.file_name]          # filename, hued by its directory
fg = { rainbow = "file_dir" }

[role.file_dir]           # trailing directory; the plain row-text class
extends = "row_text"

# ── Diff ─────────────────────────────────────────────────────────────────────
# syntect owns per-token fg; the theme sets each row's change bar, line-number
# gutters + background, and the empty-state text. Each row leads with a one-cell
# change bar — a colored marker on added/deleted rows (so the change reads even
# where the bg tint is faint), blank on context rows — then fixed-width
# before/after line numbers (diff_lineno), then the code.
[diff]
syntax_theme = "base16-ocean.dark"   # syntect theme for highlighting diff source

[role.diff_added]         # green edge marker + subtle added-row background
glyph = "▎"
fg = "palette.ok"
bg = "palette.ok.bg"

[role.diff_deleted]       # red edge marker + subtle deleted-row background
glyph = "▎"
fg = "palette.error"
bg = "palette.error.bg"

[role.diff_lineno]        # faint before/after line-number gutters
fg = "palette.faint"

[role.diff_placeholder]
extends = "secondary"

# ── Checks ───────────────────────────────────────────────────────────────────
[role.checks_summary]     # "{glyph} {n} findings"
glyph = "⚠"
fg = "default"

# ── Legend ───────────────────────────────────────────────────────────────────
# Reuses the shared roles for its glyphs (chip, dirty, ahead/behind, churn,
# file_status, segment_riser.lead); only the trailing word needs a style.
[role.legend_label]
extends = "secondary"

# ── Overlays & chrome ────────────────────────────────────────────────────────
# The hint bar, help/palette popups, and deck breadcrumb. UI copy (command
# titles, "Help — keys", "Command palette") stays in code; styles and glyphs
# live here.
[role.overlay_accent]     # shared base for interactive accent-colored chrome
fg = "palette.accent"

[role.overlay_frame]      # help/palette popup border
fg = "palette.emphasis"
bold = true

[role.breadcrumb]         # deck-mode trail: "Stacks {glyph} {stack} {glyph} {column}"
glyph = "▸"
bold = true

# Hint bar: "{key}·{key} · …", each key then its command title.
[role.hint_key]
extends = "overlay_accent"
bold = true
[role.hint_label]
extends = "secondary"
[role.hint_separator]     # between hint items, rendered " {glyph} "
glyph = "·"
fg = "palette.faint"

# Help overlay: category headings, keybinding chords, closing note.
[role.help_heading]
extends = "overlay_accent"
bold = true
[role.help_key]
fg = "palette.key"
[role.help_footer]
extends = "secondary"

# Command palette: query prompt + cursor and each result's key.
[role.palette_prompt]     # leading query marker
extends = "overlay_accent"
glyph = "› "
[role.palette_cursor]     # end-of-query caret
extends = "secondary"
glyph = "▏"
[role.palette_key]        # right-aligned key for each result
extends = "overlay_accent"

# ── States ───────────────────────────────────────────────────────────────────
# Column focus: the focused column brightens its title. Unfocused columns keep
# their content at full weight (no dimming); focus instead reads from the
# selection bar (see row_selected / row_selected_unfocused below).
[state.column_focused]
title = { fg = "palette.emphasis", bold = true }

# Selected row: a marker at the row start and a bar across the whole row. In the
# focused column the bar is `palette.selection`; when the column is unfocused it
# lightens to `palette.unfocused_selection` so the row stays visible.
[state.row_selected]
glyph = "▶ "
bg = "palette.selection"

[state.row_selected_unfocused]
bg = "palette.unfocused_selection"
